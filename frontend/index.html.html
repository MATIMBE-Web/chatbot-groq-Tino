<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 Chatbot com Memória</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #121212;
            color: #e0e0e0;
        }

        #chat {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s, box-shadow 0.3s;
        }

        body.dark #chat {
            background: #1e2a4a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            color: white;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .header-actions select {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            font-weight: 500;
        }

        .header-actions select option {
            color: #333;
            background: white;
        }

        .header-actions button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        /* MENSAGENS */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #fafafa;
            transition: background 0.3s;
        }

        body.dark #messages {
            background: #16213e;
        }

        .msg {
            margin: 12px 0;
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .msg.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg.bot {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        body.dark .msg.bot {
            background: #2a3a6a;
            color: #e0e0e0;
        }

        .msg .label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            display: block;
            margin-bottom: 4px;
        }

        .msg .time {
            font-size: 10px;
            opacity: 0.5;
            display: block;
            margin-top: 6px;
        }

        .msg .memory-badge {
            font-size: 10px;
            background: #4ade80;
            color: #1a1a2e;
            padding: 2px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 6px;
        }

        body.dark .msg .memory-badge {
            background: #2a5a3a;
            color: #a0d0a0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* DIGITAÇÃO */
        .typing-indicator {
            display: none;
            padding: 12px 18px;
            margin: 12px 0;
            background: white;
            border-radius: 18px;
            max-width: 80%;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        body.dark .typing-indicator {
            background: #2a3a6a;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator .dots {
            display: flex;
            gap: 6px;
            padding: 4px 0;
        }

        .typing-indicator .dots span {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* INPUT */
        .input-area {
            padding: 14px 24px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s;
        }

        body.dark .input-area {
            background: #1e2a4a;
            border-top-color: #2a3a6a;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            background: #fafafa;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        #input:focus {
            border-color: #667eea;
            background: white;
        }

        body.dark #input {
            background: #2a3a6a;
            border-color: #4a5a8a;
            color: #e0e0e0;
        }

        body.dark #input:focus {
            border-color: #667eea;
            background: #2a3a6a;
        }

        .input-hint {
            font-size: 11px;
            color: #999;
            padding-left: 4px;
        }

        body.dark .input-hint {
            color: #888;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #send {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            height: 50px;
            min-width: 80px;
        }

        #send:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #send:active {
            transform: scale(0.98);
        }

        #send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            border: 2px solid #e0e0e0;
            background: #fafafa;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        body.dark .icon-btn {
            background: #2a3a6a;
            border-color: #4a5a8a;
            color: #e0e0e0;
        }

        body.dark .icon-btn:hover {
            background: #3a4a7a;
        }

        /* STATUS */
        .status-bar {
            padding: 8px 24px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
            flex-wrap: wrap;
            gap: 5px;
        }

        body.dark .status-bar {
            background: #1a2a4a;
            border-top-color: #2a3a6a;
            color: #aaa;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online {
            background: #4ade80;
        }
        .status-dot.offline {
            background: #f87171;
        }
        .status-dot.thinking {
            background: #fbbf24;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-right span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* SCROLLBAR */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            #chat {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }
            .header {
                padding: 12px 16px;
            }
            .header h1 {
                font-size: 16px;
            }
            #messages {
                padding: 12px 16px;
            }
            .msg {
                max-width: 92%;
                font-size: 14px;
            }
            .input-area {
                padding: 10px 16px;
                flex-wrap: wrap;
            }
            #send {
                padding: 10px 18px;
                font-size: 14px;
                height: 44px;
                min-width: 60px;
            }
            .icon-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .header-actions button {
                font-size: 12px;
                padding: 4px 10px;
            }
            .header-actions select {
                font-size: 12px;
                padding: 4px 8px;
            }
            .status-bar {
                font-size: 10px;
                padding: 6px 16px;
            }
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #4ade80;
            color: #1a1a2e;
        }
        .toast.error {
            background: #f87171;
            color: #1a1a2e;
        }
        .toast.info {
            background: #60a5fa;
            color: #1a1a2e;
        }
    </style>
</head>

<body>

    <div id="toast" class="toast"></div>

    <div id="chat">

        <!-- HEADER -->
        <div class="header">
            <h1>
                <span>🧠</span>
                Chatbot com Memória
            </h1>
            <div class="header-actions">
                <select id="personalitySelect">
                    <option value="default">🤖 Assistente</option>
                    <option value="professor">👨‍🏫 Professor</option>
                    <option value="programador">💻 Programador</option>
                    <option value="chef">🍳 Chef</option>
                    <option value="financeiro">💰 Financeiro</option>
                    <option value="fitness">🏋️ Fitness</option>
                    <option value="coach">🎯 Coach</option>
                </select>
                <button onclick="toggleDarkMode()" id="darkBtn" title="Modo escuro">🌙</button>
                <button onclick="clearChat()" title="Limpar conversa">🗑️</button>
                <button onclick="exportChat()" title="Exportar conversa">📥</button>
                <button onclick="toggleSound()" id="soundBtn" title="Som">🔊</button>
                <button onclick="clearMemory()" title="Limpar memória" style="background:rgba(255,50,50,0.3);">🧹</button>
            </div>
        </div>

        <!-- MENSAGENS -->
        <div id="messages"></div>

        <!-- INDICADOR DE DIGITAÇÃO -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" rows="1" placeholder="Digite sua pergunta em português... (Enter para enviar)"></textarea>
                <div class="input-hint">🧠 O bot lembra de conversas anteriores! • 🇧🇷 Português</div>
            </div>
            <div class="input-actions">
                <button class="icon-btn" onclick="attachFile()" title="Anexar arquivo">📎</button>
                <button id="send">Enviar</button>
            </div>
        </div>

        <!-- STATUS -->
        <div class="status-bar">
            <div>
                <span class="status-dot online" id="statusDot"></span>
                <span id="statusText">Online</span>
            </div>
            <div class="status-right">
                <span>💬 <span id="msgCount">0</span></span>
                <span>🧠 <span id="memoryCount">0</span> msgs</span>
                <span>🤖 <span id="modelName">Groq</span></span>
                <span>🎭 <span id="currentPersonality">Assistente</span></span>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÕES
        // ============================================================
        const API_URL = 'http://localhost:5000/api/chat';
        const SESSION_ID = 'user_' + Date.now(); // ID único para esta sessão
        let isWaiting = false;
        let messageCount = 0;
        let memoryCount = 0;
        let soundEnabled = true;
        let darkMode = false;

        // ============================================================
        // DOM ELEMENTOS
        // ============================================================
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const typingDiv = document.getElementById('typingIndicator');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const msgCountEl = document.getElementById('msgCount');
        const memoryCountEl = document.getElementById('memoryCount');
        const modelNameEl = document.getElementById('modelName');
        const currentPersonalityEl = document.getElementById('currentPersonality');
        const personalitySelect = document.getElementById('personalitySelect');
        const toast = document.getElementById('toast');

        const personalityNames = {
            'default': 'Assistente',
            'professor': 'Professor',
            'programador': 'Programador',
            'chef': 'Chef',
            'financeiro': 'Financeiro',
            'fitness': 'Fitness',
            'coach': 'Coach'
        };

        // ============================================================
        // FUNÇÕES
        // ============================================================

        function addMessage(role, content, memoryCount = null) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg ' + role;

            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = role === 'user' ? '👤 Você' : '🤖 Assistente';
            wrapper.appendChild(label);

            const textNode = document.createTextNode(content);
            wrapper.appendChild(textNode);

            if (role === 'bot' && memoryCount !== null) {
                const badge = document.createElement('span');
                badge.className = 'memory-badge';
                badge.textContent = '🧠 ' + memoryCount + ' mensagens na memória';
                wrapper.appendChild(badge);
            }

            const time = document.createElement('span');
            time.className = 'time';
            time.textContent = new Date().toLocaleTimeString();
            wrapper.appendChild(time);

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (role === 'user') {
                messageCount++;
                msgCountEl.textContent = messageCount;
            }

            if (role === 'bot' && soundEnabled) {
                speakText(content);
            }
        }

        function showTyping() {
            typingDiv.classList.add('active');
            statusDot.className = 'status-dot thinking';
            statusText.textContent = 'Pensando...';
            sendBtn.disabled = true;
        }

        function hideTyping() {
            typingDiv.classList.remove('active');
            statusDot.className = 'status-dot online';
            statusText.textContent = 'Online';
            sendBtn.disabled = false;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isWaiting) return;

            input.value = '';
            input.style.height = 'auto';

            addMessage('user', text);
            isWaiting = true;
            showTyping();

            const personality = personalitySelect.value;
            const personalityName = personalityNames[personality] || personality;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: text }],
                        personality: personality,
                        session_id: SESSION_ID
                    })
                });

                hideTyping();
                const data = await response.json();

                if (response.ok) {
                    // Atualiza o contador de memória
                    if (data.history_count) {
                        memoryCount = data.history_count;
                        memoryCountEl.textContent = memoryCount;
                    }

                    addMessage('bot', data.content, data.history_count);

                    if (data.model) {
                        modelNameEl.textContent = data.model.split('/').pop() || 'Groq';
                    }
                    currentPersonalityEl.textContent = personalityName;
                } else {
                    addMessage('bot', '❌ Erro: ' + (data.error || 'Erro desconhecido'));
                    showToast('Erro ao processar', 'error');
                }
            } catch (error) {
                hideTyping();
                addMessage('bot', '❌ Erro de conexão!\nVerifique se o servidor está rodando.');
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
                showToast('Servidor offline!', 'error');
            }

            isWaiting = false;
            input.focus();
        }

        // ============================================================
        // FUNCIONALIDADES EXTRAS
        // ============================================================

        function speakText(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            showToast(soundEnabled ? 'Som ativado' : 'Som desativado', 'info');
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            document.body.classList.toggle('dark', darkMode);
            const btn = document.getElementById('darkBtn');
            btn.textContent = darkMode ? '☀️' : '🌙';
            localStorage.setItem('darkMode', darkMode);
        }

        if (localStorage.getItem('darkMode') === 'true') {
            toggleDarkMode();
        }

        function clearChat() {
            if (confirm('Tem certeza que deseja limpar o chat (apenas visual)?')) {
                messagesDiv.innerHTML = '';
                messageCount = 0;
                msgCountEl.textContent = '0';
                addMessage('bot', '🧹 Chat limpo! Mas a memória do bot continua intacta.');
                showToast('Chat limpo!', 'success');
            }
        }

        async function clearMemory() {
            if (confirm('Tem certeza que deseja APAGAR TODA A MEMÓRIA do bot?\nIsso fará ele esquecer tudo!')){
                try {
                    const response = await fetch(`http://localhost:5000/api/clear_memory/${SESSION_ID}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        memoryCount = 0;
                        memoryCountEl.textContent = '0';
                        showToast('🧠 Memória apagada! O bot esqueceu tudo.', 'success');
                        addMessage('bot', '🧠 Minha memória foi apagada! Começamos do zero.');
                    }
                } catch (error) {
                    showToast('Erro ao apagar memória', 'error');
                }
            }
        }

        function exportChat() {
            const msgs = messagesDiv.querySelectorAll('.msg');
            if (msgs.length === 0) {
                showToast('Nenhuma mensagem para exportar', 'error');
                return;
            }

            let text = '🧠 CHATBOT COM MEMÓRIA - CONVERSA\n';
            text += '='.repeat(50) + '\n';
            text += 'Data: ' + new Date().toLocaleString() + '\n';
            text += 'Sessão: ' + SESSION_ID + '\n';
            text += 'Personalidade: ' + personalityNames[personalitySelect.value] + '\n\n';

            msgs.forEach(msg => {
                const role = msg.querySelector('.label').textContent;
                const content = msg.textContent
                    .replace(role, '')
                    .replace(/\d{2}:\d{2}:\d{2}/g, '')
                    .replace(/🧠 \d+ mensagens na memória/g, '')
                    .trim();
                text += role + '\n' + content + '\n\n';
            });

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'chat_' + new Date().toISOString().slice(0, 10) + '.txt';
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('Conversa exportada!', 'success');
        }

        function attachFile() {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.txt,.md,.csv,.json';
            fileInput.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const content = ev.target.result;
                    input.value = '📄 Conteúdo de "' + file.name + '":\n\n' + content;
                    sendMessage();
                };
                reader.readAsText(file);
                showToast('Arquivo anexado!', 'success');
            };
            fileInput.click();
        }

        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // EVENTOS
        // ============================================================
        sendBtn.addEventListener('click', sendMessage);

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        personalitySelect.addEventListener('change', function() {
            const name = personalityNames[this.value] || this.value;
            currentPersonalityEl.textContent = name;
            showToast(`🎭 Personalidade alterada para: ${name}`, 'info');
        });

        // ============================================================
        // CHECK HEALTH
        // ============================================================
        async function checkHealth() {
            try {
                const response = await fetch('http://localhost:5000/api/health');
                if (response.ok) {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = 'Online';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Offline';
                }
            } catch {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            }
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        addMessage('bot', '🧠 Olá! Agora tenho MEMÓRIA!\n\n' +
            '🇧🇷 Falo português e lembro de conversas anteriores.\n' +
            '🎭 Escolha uma personalidade no menu acima.\n' +
            '💡 Pergunte algo e depois pergunte "O que eu falei antes?"\n\n' +
            'Vamos conversar!');

        currentPersonalityEl.textContent = personalityNames[personalitySelect.value] || 'Assistente';

        setInterval(checkHealth, 15000);
        checkHealth();

        console.log('🧠 Chatbot com Memória - Sessão:', SESSION_ID);
        console.log('🤖 Frontend pronto!');
    </script>
</body>
</html>
