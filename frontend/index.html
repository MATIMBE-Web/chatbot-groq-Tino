<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Chatbot Inteligente</title>
    <style>
        /* ===== RESET E ESTILOS GERAIS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* ===== MODO ESCURO ===== */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode #chat {
            background: #1e2a4a;
            color: #e0e0e0;
        }

        body.dark-mode .message.bot {
            background: #2a3a6a;
            color: #e0e0e0;
        }

        body.dark-mode #input {
            background: #2a3a6a;
            color: #e0e0e0;
            border-color: #4a5a8a;
        }

        body.dark-mode .header-controls button {
            background: #2a3a6a;
            color: #e0e0e0;
        }

        body.dark-mode .status-bar {
            background: #1a2a4a;
            color: #aaa;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        #chat {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 20px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            font-size: 28px;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .header-controls button.active {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ===== ÁREA DE MENSAGENS ===== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            background: #f8f9fa;
            transition: background 0.3s ease;
        }

        body.dark-mode #messages {
            background: #16213e;
        }

        /* ===== MENSAGENS ===== */
        .message {
            margin: 12px 0;
            padding: 12px 18px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        body.dark-mode .message.bot {
            background: #2a3a6a;
            color: #e0e0e0;
        }

        .message .role {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 4px;
            display: block;
        }

        .message.user .role {
            opacity: 0.8;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
        }

        /* ===== MENSAGEM DE DIGITAÇÃO ===== */
        .typing-indicator {
            display: none;
            padding: 12px 18px;
            margin: 12px 0;
            background: white;
            border-radius: 15px;
            max-width: 80%;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        body.dark-mode .typing-indicator {
            background: #2a3a6a;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator .dots {
            display: flex;
            gap: 5px;
            padding: 5px 0;
        }

        .typing-indicator .dots span {
            width: 10px;
            height: 10px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 15px 25px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: background 0.3s ease;
        }

        body.dark-mode .input-area {
            background: #1e2a4a;
            border-top-color: #2a3a6a;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            resize: none;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        #input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        body.dark-mode #input {
            background: #2a3a6a;
            color: #e0e0e0;
            border-color: #4a5a8a;
        }

        body.dark-mode #input:focus {
            background: #2a3a6a;
            border-color: #667eea;
        }

        #input::placeholder {
            color: #999;
        }

        .input-hint {
            font-size: 11px;
            color: #999;
            padding-left: 5px;
        }

        body.dark-mode .input-hint {
            color: #888;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #send {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
            height: 50px;
            min-width: 80px;
        }

        #send:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #send:active {
            transform: scale(0.98);
        }

        #send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            background: #fafafa;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        body.dark-mode .icon-btn {
            background: #2a3a6a;
            border-color: #4a5a8a;
            color: #e0e0e0;
        }

        body.dark-mode .icon-btn:hover {
            background: #3a4a7a;
        }

        /* ===== STATUS BAR ===== */
        .status-bar {
            padding: 8px 25px;
            background: #f0f0f0;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            transition: background 0.3s ease;
        }

        body.dark-mode .status-bar {
            background: #1a2a4a;
            color: #aaa;
            border-top-color: #2a3a6a;
        }

        .status-bar .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.online {
            background: #4ade80;
        }
        .status-dot.offline {
            background: #f87171;
        }
        .status-dot.thinking {
            background: #fbbf24;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .status-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-right span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== SCROLLBAR ===== */
        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 600px) {
            #chat {
                height: 100vh;
                max-height: none;
                border-radius: 0;
            }

            .header {
                padding: 15px 18px;
            }

            .header h1 {
                font-size: 18px;
            }

            #messages {
                padding: 15px 18px;
            }

            .message {
                max-width: 90%;
                font-size: 14px;
            }

            .input-area {
                padding: 12px 18px;
                flex-wrap: wrap;
            }

            #send {
                padding: 10px 20px;
                font-size: 14px;
                height: 45px;
                min-width: 60px;
            }

            .icon-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .header-controls button {
                font-size: 11px;
                padding: 6px 10px;
            }

            .status-bar {
                font-size: 10px;
                padding: 6px 18px;
                flex-wrap: wrap;
                gap: 5px;
            }
        }

        /* ===== TOAST NOTIFICATION ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #4ade80;
            color: #1a1a2e;
        }

        .toast.error {
            background: #f87171;
            color: #1a1a2e;
        }
    </style>
</head>

function toggleSearch() {

    const btn = document.getElementById('searchBtn');
    btn.textContent = searchEnabled ? '🔍 Ativado' : '🔍 Pesquisar';
    btn.style.background = searchEnabled ? 'rgba(76, 175, 80, 0.5)' : 'rgba(255,255,255,0.2)';
    showToast(searchEnabled ? 'Pesquisa na web ativada!' : 'Pesquisa na web desativada', 'info');
}

        // ===== CONFIGURAÇÕES =====
        const API_URL = 'http://localhost:5000/api/chat';
        let isWaiting = false;
        let messageCount = 0;
        let tokenCount = 0;
        let soundEnabled = true;

        // ===== ELEMENTOS DOM =====
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const msgCount = document.getElementById('msgCount');
        const tokenCountEl = document.getElementById('tokenCount');
        const modelNameEl = document.getElementById('modelName');
        const toast = document.getElementById('toast');

        // ===== FUNÇÕES =====

        // Adicionar mensagem
        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = 'message ' + role;

            const roleSpan = document.createElement('span');
            roleSpan.className = 'role';
            roleSpan.textContent = role === 'user' ? '👤 Você' : '🤖 Assistente';
            div.appendChild(roleSpan);

            const textNode = document.createTextNode(content);
            div.appendChild(textNode);

            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = new Date().toLocaleTimeString();
            div.appendChild(timeSpan);

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            if (role === 'user') {
                messageCount++;
                msgCount.textContent = messageCount;
            }

            // Se for resposta do bot e som estiver ativo
            if (role === 'bot' && soundEnabled) {
                speakText(content);
            }
        }

        // Mostrar/Esconder digitação
        function showTyping() {
            typingIndicator.classList.add('active');
            statusDot.className = 'status-dot thinking';
            statusText.textContent = 'Pensando...';
            sendBtn.disabled = true;
        }

        function hideTyping() {
            typingIndicator.classList.remove('active');
            statusDot.className = 'status-dot online';
            statusText.textContent = 'Online';
            sendBtn.disabled = false;
        }

        // Enviar mensagem
        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isWaiting) return;

            input.value = '';
            input.style.height = 'auto';

            addMessage('user', text);
            isWaiting = true;
            showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: text }]
                    })
                });

                hideTyping();
                const data = await response.json();

                if (response.ok) {
                    addMessage('bot', data.content);
                    if (data.model) {
                        modelNameEl.textContent = data.model.split('/').pop() || 'Groq';
                    }
                    // Atualizar tokens se disponível
                    if (data.usage) {
                        tokenCount += data.usage.total_tokens || 0;
                        tokenCountEl.textContent = tokenCount;
                    }
                } else {
                    addMessage('bot', '❌ Erro: ' + (data.error || 'Erro desconhecido'));
                    showToast('Erro ao processar', 'error');
                }
            } catch (error) {
                hideTyping();
                addMessage('bot', '❌ Erro de conexão: ' + error.message + '\nVerifique se o servidor está rodando.');
                showToast('Servidor offline!', 'error');
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            }
            isWaiting = false;
            input.focus();
        }

        // ===== SÍNTESE DE VOZ =====
        function speakText(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            showToast(soundEnabled ? 'Som ativado' : 'Som desativado', 'success');
        }

        // ===== MODO ESCURO =====
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.header-controls button:first-child');
            btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Carregar preferência de modo escuro
        if (localStorage.getItem('darkMode') === 'true') {
            toggleDarkMode();
        }

        // ===== LIMPAR CHAT =====
        function clearChat() {
            if (confirm('Tem certeza que deseja limpar a conversa?')) {
                messagesDiv.innerHTML = '';
                messageCount = 0;
                msgCount.textContent = '0';
                showToast('Conversa limpa!', 'success');
                // Adicionar mensagem de boas-vindas
                addMessage('bot', 'Olá! Conversa limpa. Pergunte o que quiser! 🇧🇷');
            }
        }

        // ===== EXPORTAR CHAT =====
        function exportChat() {
            const messages = messagesDiv.querySelectorAll('.message');
            if (messages.length === 0) {
                showToast('Nenhuma mensagem para exportar', 'error');
                return;
            }

            let text = '🤖 CHATBOT GROQ - CONVERSA\n';
            text += '=' .repeat(50) + '\n';
            text += 'Data: ' + new Date().toLocaleString() + '\n\n';

            messages.forEach(msg => {
                const role = msg.querySelector('.role').textContent;
                const content = msg.textContent.replace(role, '').replace(/\d{2}:\d{2}:\d{2}/g, '').trim();
                text += role + '\n' + content + '\n\n';
            });

            // Baixar arquivo
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'chat_' + new Date().toISOString().slice(0, 10) + '.txt';
            link.click();
            URL.revokeObjectURL(link.href);

            showToast('Conversa exportada com sucesso!', 'success');
        }

        // ===== ANEXAR ARQUIVO =====
        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.pdf,.docx,.md';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const content = event.target.result;
                    // Envia o conteúdo do arquivo como mensagem
                    const fileContent = 📄 Conteúdo do arquivo "":\n\n;
                    input.value = fileContent;
                    sendMessage();
                };
                reader.readAsText(file);
                showToast(Arquivo "" anexado!, 'success');
            };
            input.click();
        }

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');

            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===== EVENTOS =====
        sendBtn.addEventListener('click', sendMessage);

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto-resize do textarea
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ===== MENSAGEM DE BOAS-VINDAS =====
        addMessage('bot', 'Olá! Sou seu assistente em português usando Groq. 🇧🇷\n\n⚡ Rápido • 🆓 Grátis • 🤖 Inteligente\n\nPergunte o que quiser!');

        // ===== CHECK HEALTH =====
        async function checkHealth() {
            try {
                const response = await fetch('http://localhost:5000/api/health');
                if (response.ok) {
                    statusDot.className = 'status-dot online';
                    statusText.textContent = 'Online';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Offline';
                }
            } catch {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            }
        }

        // Verificar a cada 30 segundos
        setInterval(checkHealth, 30000);
        checkHealth();
